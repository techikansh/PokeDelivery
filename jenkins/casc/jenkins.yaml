jenkins:
  systemMessage: "Jenkins configured automatically"
  numExecutors: 0
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  nodes:
    - permanent:
        name: "artifact-agent-1"
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        labelString: "artifact-agent"
        mode: NORMAL
        retentionStrategy: "always"
        launcher:
          inbound:
            webSocket: true

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "github-pat"
              description: "GitHub PAT for API calls"
              secret: "${GITHUB_PAT}"
          - string:
              id: "arm-client-id"
              description: "Azure SP Client ID"
              secret: "${ARM_CLIENT_ID}"
          - string:
              id: "arm-client-secret"
              description: "Azure SP Client Secret"
              secret: "${ARM_CLIENT_SECRET}"
          - string:
              id: "arm-tenant-id"
              description: "Azure Tenant ID"
              secret: "${ARM_TENANT_ID}"
          - string:
              id: "arm-subscription-id"
              description: "Azure Subscription ID"
              secret: "${ARM_SUBSCRIPTION_ID}"

jobs:
  - script: |
      pipelineJob('Download and Archive Artifact') {
        definition {
          cps {
            script(new File('/var/jenkins_home/Jenkinsfile').text)
            sandbox(true)
          }
        }
      }
